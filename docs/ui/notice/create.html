<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Notice Board - HMS</title>
    <script src="../../dist/js/mockDb.js"></script>
    <script src="../../dist/js/layout.js"></script>
</head>
<body>
    <div id="page-wrapper">
        <div class="row">
            <div class="col-lg-12">
                <h1 class="page-header titlehms"><i class="fa fa-hand-o-right"></i> Notice Board Manager <i class="fa fa-hand-o-left"></i></h1>
            </div>
        </div>

        <div class="row">
            <!-- Add Notice Form -->
            <div class="col-md-5">
                <div class="panel panel-default">
                    <div class="panel-heading">
                        <i class="fa fa-plus fa-fw"></i> Publish New Notice
                    </div>
                    <div class="panel-body">
                        <form id="add-notice-form">
                            <div class="form-group">
                                <label>Notice Title</label>
                                <input class="form-control" name="title" required placeholder="Announcement Subject">
                            </div>
                            <div class="form-group">
                                <label>Description / Details</label>
                                <textarea class="form-control" name="description" rows="5" required placeholder="Write details here..."></textarea>
                            </div>
                            <button type="submit" class="btn btn-success btn-block"><i class="fa fa-bullhorn"></i> Publish Notice</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Notices Directory -->
            <div class="col-md-7">
                <div class="panel panel-default">
                    <div class="panel-heading">
                        <i class="fa fa-list-alt fa-fw"></i> Announcements History
                    </div>
                    <div class="panel-body">
                        <div id="notices-list">
                            <!-- Injected dynamically -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        document.addEventListener("layoutScriptsLoaded", function () {
            renderNotices();

            // Submit notice handler
            document.getElementById('add-notice-form').addEventListener('submit', function (e) {
                e.preventDefault();
                const title = this.title.value.trim();
                const description = this.description.value.trim();

                mockDb.addNotice({ title, description });
                alert("🎉 Notice published successfully! It will now appear on all user portals.");
                this.reset();
                renderNotices();
            });
        });

        function renderNotices() {
            const notices = mockDb.getNotices();
            const listDiv = document.getElementById('notices-list');
            listDiv.innerHTML = "";

            if (notices.length === 0) {
                listDiv.innerHTML = '<div class="alert alert-warning text-center">No notices published yet.</div>';
                return;
            }

            notices.forEach(notice => {
                const noticeHtml = `
                    <div class="well" style="margin-bottom: 15px; padding: 15px;">
                        <span class="label label-info pull-right">${notice.date}</span>
                        <h4 style="margin-top: 0;" class="text-success"><i class="fa fa-chevron-right"></i> ${notice.title}</h4>
                        <hr style="margin: 8px 0;">
                        <p style="white-space: pre-wrap; font-size: 13px;">${notice.description}</p>
                    </div>
                `;
                listDiv.insertAdjacentHTML('beforeend', noticeHtml);
            });
        }
    </script>
</body>
</html>
