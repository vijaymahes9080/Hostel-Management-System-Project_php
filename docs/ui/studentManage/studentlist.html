<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Student List - HMS</title>
    <script src="../../dist/js/mockDb.js"></script>
    <script src="../../dist/js/layout.js"></script>
</head>
<body>
    <div id="page-wrapper">
        <div class="row">
            <div class="col-lg-12">
                <h1 class="page-header titlehms"><i class="fa fa-hand-o-right"></i> Student List Directory <i class="fa fa-hand-o-left"></i></h1>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-12">
                <div class="panel panel-default">
                    <div class="panel-heading">
                        <i class="fa fa-users fa-fw"></i> Registered Students
                        <a href="admission.html" class="btn btn-xs btn-success pull-right"><i class="fa fa-plus"></i> New Admission</a>
                    </div>
                    <div class="panel-body">
                        <div class="table-responsive">
                            <table class="table table-striped table-bordered table-hover" id="student-table">
                                <thead>
                                    <tr>
                                        <th>Serial</th>
                                        <th>User ID</th>
                                        <th>Student Name</th>
                                        <th>Student ID</th>
                                        <th>Cell No</th>
                                        <th>Email</th>
                                        <th>Room No</th>
                                        <th>Gender</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="student-list-tbody">
                                    <!-- Dynamic rows loaded here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        document.addEventListener("layoutScriptsLoaded", function () {
            renderStudentList();
        });

        function renderStudentList() {
            const students = mockDb.getStudents();
            const tbody = document.getElementById('student-list-tbody');
            tbody.innerHTML = "";

            if (students.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="text-center">No students registered in the system.</td></tr>';
                return;
            }

            students.forEach((student) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${student.serial}</td>
                    <td><span class="label label-info">${student.userId}</span></td>
                    <td><strong>${student.name}</strong></td>
                    <td>${student.studentId}</td>
                    <td>${student.cellNo}</td>
                    <td>${student.email}</td>
                    <td><span class="label label-success">${student.roomNo || 'Unallocated'}</span></td>
                    <td>${student.gender}</td>
                    <td>
                        <button class="btn btn-xs btn-danger" onclick="deleteStudent(${student.serial})"><i class="fa fa-trash-o"></i> Delete</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.deleteStudent = function (serial) {
            if (confirm("Are you sure you want to delete this student from the system?")) {
                mockDb.deleteStudent(serial);
                renderStudentList();
            }
        };
    </script>
</body>
</html>
