<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Room Management - HMS</title>
    <script src="../../dist/js/mockDb.js"></script>
    <script src="../../dist/js/layout.js"></script>
</head>
<body>
    <div id="page-wrapper">
        <div class="row">
            <div class="col-lg-12">
                <h1 class="page-header titlehms"><i class="fa fa-hand-o-right"></i> Room Setup & Configuration <i class="fa fa-hand-o-left"></i></h1>
            </div>
        </div>

        <div class="row">
            <!-- Add New Room Form -->
            <div class="col-md-4">
                <div class="panel panel-default">
                    <div class="panel-heading">
                        <i class="fa fa-plus fa-fw"></i> Add New Room
                    </div>
                    <div class="panel-body">
                        <form id="add-room-form">
                            <div class="form-group">
                                <label>Room Number</label>
                                <input class="form-control" name="roomNo" required placeholder="e.g. 103">
                            </div>
                            <div class="form-group">
                                <label>Block Name</label>
                                <select class="form-control" name="blockName">
                                    <option>Block A</option>
                                    <option>Block B</option>
                                    <option>Block C</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Seat Capacity</label>
                                <input type="number" class="form-control" name="seatCapacity" min="1" max="10" value="4" required>
                            </div>
                            <button type="submit" class="btn btn-success btn-block"><i class="fa fa-save"></i> Save Room</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Rooms List Table -->
            <div class="col-md-8">
                <div class="panel panel-default">
                    <div class="panel-heading">
                        <i class="fa fa-building fa-fw"></i> Room Directory
                    </div>
                    <div class="panel-body">
                        <div class="table-responsive">
                            <table class="table table-striped table-bordered table-hover">
                                <thead>
                                    <tr>
                                        <th>Room No</th>
                                        <th>Block Name</th>
                                        <th>Seat Capacity</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody id="room-list-tbody">
                                    <!-- Injected dynamically -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        document.addEventListener("layoutScriptsLoaded", function () {
            renderRooms();

            // Submit handler
            document.getElementById('add-room-form').addEventListener('submit', function (e) {
                e.preventDefault();
                const roomNo = this.roomNo.value.trim();
                const blockName = this.blockName.value;
                const seatCapacity = parseInt(this.seatCapacity.value);

                const existingRooms = mockDb.getRooms();
                if (existingRooms.some(r => r.roomNo === roomNo)) {
                    alert("⚠️ Error: Room number already exists in the system!");
                    return;
                }

                mockDb.addRoom({ roomNo, blockName, seatCapacity });
                alert("🎉 Success: Room setup added successfully!");
                this.reset();
                renderRooms();
            });
        });

        function renderRooms() {
            const rooms = mockDb.getRooms();
            const tbody = document.getElementById('room-list-tbody');
            tbody.innerHTML = "";

            rooms.forEach(room => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${room.roomNo}</strong></td>
                    <td>${room.blockName}</td>
                    <td>${room.seatCapacity} seats</td>
                    <td><span class="label label-success">${room.isActive === 'Y' ? 'Active' : 'Inactive'}</span></td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
